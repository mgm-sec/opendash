<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">openDash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="opendash.css" />
</head>
<body>

<!-- ── Bottom glass dock ── -->
<div id="dock">
  <div id="dock-inner">
    <span class="dock-logo">&gt;_</span>
    <span class="dock-sep"></span>

    <button id="settings-btn" class="nav-btn" title="Settings">
      <svg width="17" height="17" viewBox="0 0 17 17" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="8.5" cy="8.5" r="2.5"/><path d="M8.5 1.5v2.2M8.5 13.3v2.2M1.5 8.5h2.2M13.3 8.5h2.2M3.6 3.6l1.5 1.5M11.9 11.9l1.5 1.5M13.4 3.6l-1.5 1.5M5.1 11.9l-1.5 1.5"/></svg>
      <span class="nav-label">SETUP</span>
    </button>

    <span class="dock-sep"></span>

    <button id="data-export" class="nav-btn nav-btn-sm" title="Export all data to JSON file">
      <svg width="16" height="16" viewBox="0 0 17 17" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M8.5 2v8.5"/><path d="M5 7.5l3.5 3.3 3.5-3.3"/><path d="M3 14h11"/></svg>
      <span class="nav-label">EXPORT</span>
    </button>
    <button id="data-import" class="nav-btn nav-btn-sm" title="Import data from JSON backup">
      <svg width="16" height="16" viewBox="0 0 17 17" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M8.5 13.5V5"/><path d="M5 8.3l3.5-3.3 3.5 3.3"/><path d="M3 2h11"/></svg>
      <span class="nav-label">IMPORT</span>
    </button>
    <input type="file" id="data-import-file" accept="application/json,.json" hidden />
  </div>
</div>

<div id="app">

  <!-- TOP BAR: clock left, search right -->
  <div id="top-bar">

    <header id="top-header">
      <div id="clock-block">
        <div id="clock"></div>
        <div id="date"></div>
      </div>
      <p id="greeting"></p>
    </header>

    <section id="search-section">
      <div id="search-meta">
        <div id="engine-toggles">
          <button id="engine-ddg"    class="engine-btn">DDG</button>
          <button id="engine-google" class="engine-btn">Google</button>
        </div>
        <div id="option-toggles">
          <button id="search-ai-toggle"      class="option-btn">AI</button>
          <button id="search-private-toggle" class="option-btn">Private</button>
        </div>
      </div>
      <form id="search-form">
        <span class="search-prompt">&gt;_</span>
        <input id="search-input" type="text" autocomplete="off" spellcheck="false" />
        <button type="submit" aria-label="Search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </form>
    </section>

  </div><!-- /top-bar -->

  <!-- WIDGET GRID — all panels are drag-and-drop reorderable and resizable -->
  <div id="widget-grid">

    <section id="weather-section" class="panel hidden">
      <header class="panel-header">
        <span class="panel-title">Weather</span>
        <div class="panel-rhs">
          <span id="weather-status" class="panel-badge"></span>
          <span class="panel-chevron">▾</span>
        </div>
      </header>
      <div class="panel-body">
        <div id="weather-pills"></div>
        <div id="weather-grid">
          <div class="w-header-row">
            <div></div>
            <div class="w-col-header">Now</div>
            <div class="w-col-header">+2h</div>
            <div class="w-col-header">+5h</div>
            <div class="w-col-header">+10h</div>
          </div>
          <!-- city rows injected by JS -->
        </div>
      </div>
    </section>

    <section id="rss-section" class="panel hidden">
      <header class="panel-header">
        <span class="panel-title">News</span>
        <div class="panel-rhs">
          <span id="rss-status" class="panel-badge"></span>
          <span class="panel-chevron">▾</span>
        </div>
      </header>
      <div class="panel-body panel-scroll" id="rss-feed"></div>
    </section>

    <section id="vacation-section" class="panel hidden">
      <header class="panel-header">
        <span class="panel-title" id="vacation-label"></span>
        <div class="panel-rhs">
          <span class="panel-chevron">▾</span>
        </div>
      </header>
      <div class="panel-body">
        <div id="vacation-countdown">
          <div class="vac-unit"><span class="vac-value" id="vac-days">--</span><span class="vac-name">days</span></div>
          <div class="vac-sep">:</div>
          <div class="vac-unit"><span class="vac-value" id="vac-hours">--</span><span class="vac-name">hrs</span></div>
          <div class="vac-sep">:</div>
          <div class="vac-unit"><span class="vac-value" id="vac-minutes">--</span><span class="vac-name">min</span></div>
          <div class="vac-sep">:</div>
          <div class="vac-unit"><span class="vac-value" id="vac-seconds">--</span><span class="vac-name">sec</span></div>
        </div>
      </div>
    </section>

    <section id="today-section" class="panel">
      <header class="panel-header">
        <span class="panel-title">Today</span>
        <div class="panel-rhs">
          <span id="today-pomo-cycles" class="panel-badge"></span>
          <span class="panel-chevron">▾</span>
        </div>
      </header>
      <div class="panel-body">
        <div id="today-pomo-wrap">
          <div id="today-pomo-bar"><div id="today-pomo-fill"></div></div>
          <div id="today-pomo-inner">
            <div id="today-pomo-meta">
              <span id="today-pomo-phase">Work</span>
              <span id="today-pomo-display">25:00</span>
            </div>
            <div id="today-pomo-btns">
              <button id="today-pomo-toggle" title="Start / Pause">▶</button>
              <button id="today-pomo-skip"   title="Skip phase">⏭</button>
              <button id="today-pomo-reset"  title="Reset">↺</button>
            </div>
          </div>
        </div>
        <form id="today-add-form">
          <input id="today-add-input" type="text" placeholder="Add a task…" autocomplete="off" />
        </form>
        <ul id="today-list"></ul>
        <p id="today-empty" class="panel-empty">No tasks yet.</p>
      </div>
    </section>

    <section id="health-section" class="panel hidden">
      <header class="panel-header">
        <span class="panel-title">Services</span>
        <div class="panel-rhs">
          <button id="health-refresh" class="panel-badge panel-badge-btn" title="Refresh">↻</button>
          <span class="panel-chevron">▾</span>
        </div>
      </header>
      <div class="panel-body">
        <div id="health-list"></div>
        <p id="health-empty" class="panel-empty hidden">No services configured.</p>
      </div>
    </section>

    <section id="scratchpad-section" class="panel hidden">
      <header class="panel-header">
        <span class="panel-title">Scratchpad</span>
        <div class="panel-rhs">
          <button id="scratchpad-fs-btn" class="panel-badge panel-badge-btn" title="Fullscreen">&#x2922;</button>
          <span class="panel-chevron">▾</span>
        </div>
      </header>
      <div class="panel-body" id="scratchpad-body"></div>
    </section>

  </div><!-- /widget-grid -->

</div><!-- /app -->

<script src="config.js"></script>
<script src="settings.js"></script>
<script src="app.js"></script>
</body>
</html>
