services:
  opendash:
    build: .
    ports:
      - "127.0.0.1:8151:8151" # loopback-only: LAN devices can't reach it; drop the 127.0.0.1 to allow them
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway" # health-check widget pings host services
